<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цилиндровый Взлом (Аркадный режим)</title>
    <style>
        :root {
            --bg-dark: #0a0e12;
            --panel-bg: #131920;
            --accent-gold: #ffb703;
            --pin-up: #38b000;
            --text-light: #f8f9fa;
            --border-color: #242f3d;
            --error-red: #d90429;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.15s ease;
            touch-action: none; 
        }

        .phone-wrapper {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            max-height: 900px;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid var(--border-color);
            padding: 20px 20px 5px 20px;
            justify-content: flex-start;
        }

        @media (min-width: 450px) {
            .phone-wrapper {
                height: 85vh;
                border-radius: 24px;
                margin-top: 20px;
            }
        }

        h1 {
            color: var(--accent-gold);
            font-size: 26px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            text-align: center;
        }

        .subtitle {
            font-size: 15px;
            color: #6c7a89;
            margin: 0 0 15px 0;
            text-align: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: auto;
        }

        .screen.active {
            display: flex;
        }

        .setup-section {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .setup-label {
            font-size: 16px;
            color: #8a9ba8;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            text-align: center;
        }

        .picks-input {
            width: 100%;
            background: #090c0f;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--accent-gold);
            font-size: 22px;
            font-weight: bold;
            outline: none;
            text-align: center;
        }

        .picks-input:focus {
            border-color: var(--accent-gold);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #1b2430, #161d27);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn::after {
            content: '→';
            color: var(--accent-gold);
            font-weight: bold;
        }

        .menu-btn:active {
            transform: scale(0.98);
            border-color: var(--accent-gold);
            background: #202b39;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .hud-item span {
            color: var(--accent-gold);
        }

        .lock-housing {
            background: #090c0f;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 15px 10px;
            margin: 0 0 15px 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8);
        }

        .lock-housing.grid-6 { grid-template-columns: repeat(3, 1fr); }
        .lock-housing.grid-8 { grid-template-columns: repeat(4, 1fr); }

        .lock-channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.01);
            padding: 6px 0;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .lock-channel.selected {
            border-color: rgba(255, 183, 3, 0.4);
            background: rgba(255, 183, 3, 0.04);
        }

        .pin-socket {
            height: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 6px;
            position: relative;
        }

        .pin-socket::after {
            content: '';
            position: absolute;
            left: 15%;
            right: 15%;
            bottom: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .lock-pin {
            width: 8px;
            height: 26px;
            background: #4a5768;
            border-radius: 3px 3px 0 0;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1), background 0.3s;
            transform: translateY(26px);
        }

        .lock-pin.popped {
            background: var(--pin-up);
            transform: translateY(0);
            box-shadow: 0 0 12px var(--pin-up);
        }

        .slider-track {
            width: 42px;
            height: 12px;
            background: #05070a;
            border-radius: 20px;
            position: relative;
            border: 1px solid #1a222c;
        }

        .plate-slider {
            width: 8px;
            height: 8px;
            background: #8a9ba8;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            transition: left 0.15s ease;
        }

        .lock-channel.selected .plate-slider {
            background: var(--accent-gold);
            box-shadow: 0 0 8px var(--accent-gold);
        }

        .plate-slider.wall-danger {
            background: var(--error-red) !important;
            box-shadow: 0 0 10px var(--error-red) !important;
        }

        .mobile-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 0;
        }

        .control-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .pad-btn {
            flex: 1;
            background: #1b2430;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }

        .pad-btn:active {
            background: #253344;
        }

        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 18, 0.96);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeIn 0.15s ease forwards;
        }

        .result-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 10px;
        }

        .result-title.win { color: var(--pin-up); text-shadow: 0 0 20px rgba(56, 176, 0, 0.5); }
        .result-title.lose { color: var(--error-red); text-shadow: 0 0 20px rgba(217, 4, 41, 0.5); }

        .result-sub {
            font-size: 16px;
            color: #8a9ba8;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div id="result-overlay" class="result-overlay">
        <div id="res-title" class="result-title">Заголовок</div>
        <div id="res-sub" class="result-sub">Подзаголовок</div>
    </div>

    <div id="menu-screen" class="screen active">
        <h1>Цилиндровый взлом</h1>
        <p class="subtitle">Выбор пластин тапом. Сдвиг — кнопками или свайпом.</p>
        
        <div class="setup-section">
            <label class="setup-label" for="custom-picks">Количество отмычек:</label>
            <input type="number" id="custom-picks" class="picks-input" value="5" min="1" max="999" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="startPuzzle('medium')">4 Слайдера (Нормал)</button>
            <button class="menu-btn" onclick="startPuzzle('hard')">6 Слайдеров (Сложный)</button>
            <button class="menu-btn" onclick="startPuzzle('expert')">8 Слайдеров (Мастер)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h1 id="puzzle-title">Замок</h1>
        <p class="subtitle">Сдвигайте пластины к центру (позиция 4)</p>
        
        <div class="hud-bar">
            <div class="hud-item">Канал: <span id="hud-active">1</span></div>
            <div class="hud-item">Отмычки: <span id="hud-picks">0</span></div>
        </div>

        <div class="lock-housing" id="lock-cylinder"></div>

        <div class="mobile-controls">
            <div class="control-row">
                <button class="pad-btn" onclick="moveSelected(-1)">◀ Сдвиг</button>
                <button class="pad-btn" onclick="moveSelected(1)">Сдвиг ▶</button>
            </div>
        </div>
    </div>
</div>

<script>
    const configs = {
        medium: { size: 4, name: "Шифр-Замок (4 Слайдера)", chance: 0.5 },
        hard: { size: 6, name: "Супер-Блок (6 Слайдеров)", chance: 0.65 },
        expert: { size: 8, name: "Двухрядный Сейф (8 Слайдеров)", chance: 0.85 }
    };

    let activeConfig = null;
    let positions = [];
    let links = [];
    let selectedIdx = 0;
    let durability = 5;
    let gameEnded = false;
    let overlayActive = false;

    let touchStartX = 0;
    let touchStartY = 0;

    function startPuzzle(tier) {
        activeConfig = configs[tier];
        positions = [];
        links = [];
        selectedIdx = 0;
        gameEnded = false;
        overlayActive = false;

        let inputElement = document.getElementById('custom-picks');
        let inputVal = parseInt(inputElement.value);
        if (isNaN(inputVal) || inputVal < 1) {
            inputVal = 5;
            inputElement.value = 5;
        }
        durability = inputVal;

        const validStarts = [2, 3, 5, 6]; 
        for (let i = 0; i < activeConfig.size; i++) {
            positions.push(validStarts[Math.floor(Math.random() * validStarts.length)]);
        }

        let order = [];
        for (let i = 0; i < activeConfig.size; i++) order.push(i);
        for (let i = order.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [order[i], order[j]] = [order[j], order[i]];
        }

        for (let i = 0; i < activeConfig.size; i++) {
            links[i] = new Array(activeConfig.size).fill(0);
            links[i][i] = 1; 
        }

        let connectionChance = activeConfig.chance; 
        for (let i = 0; i < order.length; i++) {
            for (let j = i + 1; j < order.length; j++) {
                if (Math.random() < connectionChance) {
                    let source = order[i];
                    let target = order[j];
                    links[source][target] = Math.random() < 0.5 ? 1 : -1;
                }
            }
        }

        buildDOM();
        updateUI();

        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
    }

    function buildDOM() {
        const cylinder = document.getElementById('lock-cylinder');
        cylinder.innerHTML = '';
        
        cylinder.className = 'lock-housing';
        if (activeConfig.size === 6) cylinder.classList.add('grid-6');
        if (activeConfig.size === 8) cylinder.classList.add('grid-8');

        for (let i = 0; i < activeConfig.size; i++) {
            const channel = document.createElement('div');
            channel.className = 'lock-channel';
            channel.id = `channel-${i}`;
            channel.onclick = () => { if(!gameEnded && !overlayActive) { selectedIdx = i; updateUI(); } };

            const socket = document.createElement('div');
            socket.className = 'pin-socket';
            const pin = document.createElement('div');
            pin.className = 'lock-pin';
            pin.id = `pin-${i}`;
            socket.appendChild(pin);

            const track = document.createElement('div');
            track.className = 'slider-track';
            const slider = document.createElement('div');
            slider.className = 'plate-slider';
            slider.id = `slider-${i}`;
            track.appendChild(slider);

            channel.appendChild(socket);
            channel.appendChild(track);
            cylinder.appendChild(channel);
        }
    }

    function updateUI() {
        document.getElementById('hud-active').innerText = selectedIdx + 1;
        document.getElementById('hud-picks').innerText = durability;
        document.getElementById('puzzle-title').innerText = activeConfig.name;

        let winStatus = true;

        for (let i = 0; i < activeConfig.size; i++) {
            const channel = document.getElementById(`channel-${i}`);
            const slider = document.getElementById(`slider-${i}`);
            const pin = document.getElementById(`pin-${i}`);

            if (i === selectedIdx) channel.classList.add('selected');
            else channel.classList.remove('selected');

            let leftPx = ((positions[i] - 1) / 6) * 30; 
            slider.style.left = `${leftPx}px`;

            if (positions[i] === 1 || positions[i] === 7) {
                slider.classList.add('wall-danger');
            } else {
                slider.classList.remove('wall-danger');
            }

            if (positions[i] === 4) {
                pin.classList.add('popped');
            } else {
                pin.classList.remove('popped');
                winStatus = false;
            }
        }

        if (winStatus && !gameEnded && !overlayActive) {
            showMessage("СУНДУК ОТКРЫТ!", "Вы успешно взломали механизм!", true);
        }
    }

    function moveSelected(direction) {
        if (gameEnded || overlayActive) return;

        let hitWall = false;
        let tempPositions = [...positions];

        for (let target = 0; target < activeConfig.size; target++) {
            let mult = links[selectedIdx][target];
            if (mult !== 0) {
                tempPositions[target] += (direction * mult);
                if (tempPositions[target] < 1 || tempPositions[target] > 7) {
                    hitWall = true;
                }
            }
        }

        if (hitWall) {
            durability--;
            updateUI();
            
            if (durability <= 0) {
                showMessage("ИГРА ОКОНЧЕНА!", "Все отмычки сломаны.", false, true);
            } else {
                showMessage("ОТМЫЧКА СЛОМАЛАСЬ!", `Осталось отмычек: ${durability}`, false, false);
            }
        } else {
            positions = tempPositions;
            updateUI();
        }
    }

    function showMessage(titleText, subText, isWin, finalLose = false) {
        overlayActive = true;
        const overlay = document.getElementById('result-overlay');
        const title = document.getElementById('res-title');
        const sub = document.getElementById('res-sub');
        
        title.innerText = titleText;
        sub.innerText = finalLose || isWin ? "Возврат в меню..." : subText;
        
        if (isWin) {
            title.className = "result-title win";
            gameEnded = true;
        } else {
            title.className = "result-title lose";
            if (finalLose) gameEnded = true;
        }

        overlay.style.display = 'flex';

        setTimeout(() => {
            overlay.style.display = 'none';
            overlayActive = false;
            
            if (gameEnded) {
                document.getElementById('game-screen').classList.remove('active');
                document.getElementById('menu-screen').classList.add('active');
            }
        }, 1200);
    }

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (gameEnded || overlayActive) return;
        let diffX = e.changedTouches[0].screenX - touchStartX;
        let diffY = e.changedTouches[0].screenY - touchStartY;

        if (Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 0) moveSelected(1); else moveSelected(-1);
        }
    }, {passive: true});

    window.addEventListener('keydown', e => {
        if (!document.getElementById('game-screen').classList.contains('active') || gameEnded || overlayActive) return;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveSelected(-1);
        if (e.code === 'KeyD' || e.code === 'ArrowRight') moveSelected(1);
    });
</script>
</body>
</html>
