<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цилиндровый Взлом (Стабильная сборка)</title>
    <style>
        :root {
            --bg-dark: #0a0e12;
            --panel-bg: #131920;
            --accent-gold: #ffb703;
            --pin-up: #38b000;
            --text-light: #f8f9fa;
            --border-color: #242f3d;
            --error-red: #d90429;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.15s ease;
            /* Исправление: предотвращаем системные жесты браузера на смартфонах */
            touch-action: none; 
        }

        .phone-wrapper {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            max-height: 900px;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        @media (min-width: 450px) {
            .phone-wrapper {
                height: 85vh;
                border-radius: 24px;
            }
        }

        h1 {
            color: var(--accent-gold);
            font-size: 20px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .subtitle {
            font-size: 12px;
            color: #6c7a89;
            margin: 0 0 20px 0;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: center;
        }

        .screen.active {
            display: flex;
        }

        .setup-section {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .setup-label {
            font-size: 13px;
            color: #8a9ba8;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .picks-input {
            width: 100%;
            background: #090c0f;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--accent-gold);
            font-size: 16px;
            font-weight: bold;
            outline: none;
            text-align: center;
        }

        .picks-input:focus {
            border-color: var(--accent-gold);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #1b2430, #161d27);
            color: var(--text-light);
            border: 1px solid var(--border-color);
            padding: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn::after {
            content: '→';
            color: var(--accent-gold);
            font-weight: bold;
        }

        .menu-btn:active {
            transform: scale(0.98);
            border-color: var(--accent-gold);
            background: #202b39;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .hud-item span {
            color: var(--accent-gold);
        }

        .lock-housing {
            background: #090c0f;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 25px 10px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8);
            flex-grow: 1;
            align-items: center;
            max-height: 280px;
        }

        .lock-channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            background: rgba(255,255,255,0.01);
            padding: 12px 0;
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .lock-channel.selected {
            border-color: rgba(255, 183, 3, 0.4);
            background: rgba(255, 183, 3, 0.04);
        }

        .pin-socket {
            height: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 15px;
            position: relative;
        }

        .pin-socket::after {
            content: '';
            position: absolute;
            left: 15%;
            right: 15%;
            bottom: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .lock-pin {
            width: 10px;
            height: 40px;
            background: #4a5768;
            border-radius: 4px 4px 0 0;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1), background 0.3s;
            transform: translateY(40px);
        }

        .lock-pin.popped {
            background: var(--pin-up);
            transform: translateY(0);
            box-shadow: 0 0 12px var(--pin-up);
        }

        .slider-track {
            width: 44px;
            height: 16px;
            background: #05070a;
            border-radius: 20px;
            position: relative;
            border: 1px solid #1a222c;
        }

        .plate-slider {
            width: 12px;
            height: 12px;
            background: #8a9ba8;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            transition: left 0.15s ease;
        }

        .lock-channel.selected .plate-slider {
            background: var(--accent-gold);
            box-shadow: 0 0 8px var(--accent-gold);
        }

        .plate-slider.wall-danger {
            background: var(--error-red) !important;
            box-shadow: 0 0 10px var(--error-red) !important;
        }

        .msg-box {
            height: 40px;
            font-weight: 600;
            font-size: 13px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a9ba8;
        }

        .mobile-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .control-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .pad-btn {
            flex: 1;
            background: #1b2430;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }

        .pad-btn:active {
            background: #253344;
        }

        .nav-btn {
            background: #11171f;
            color: #8a9ba8;
            font-size: 13px;
            padding: 12px;
        }

        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 18, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeIn 0.2s ease forwards;
        }

        .result-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
        }

        .result-title.win { color: var(--pin-up); text-shadow: 0 0 20px rgba(56, 176, 0, 0.4); }
        .result-title.lose { color: var(--error-red); text-shadow: 0 0 20px rgba(217, 4, 41, 0.4); }

        .result-sub {
            font-size: 14px;
            color: #6c7a89;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div id="result-overlay" class="result-overlay">
        <div id="res-title" class="result-title">Заголовок</div>
        <div class="result-sub">Возврат на главный экран...</div>
    </div>

    <div id="menu-screen" class="screen active">
        <h1>Цилиндровый взлом</h1>
        <p class="subtitle">Назначьте ресурсы и выберите конфигурацию замка</p>
        
        <div class="setup-section">
            <label class="setup-label" for="custom-picks">Задать количество отмычек:</label>
            <input type="number" id="custom-picks" class="picks-input" value="3" min="1" max="999" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="startPuzzle('easy')">2 Слайдера (Простой)</button>
            <button class="menu-btn" onclick="startPuzzle('medium')">4 Слайдера (Оптимальный)</button>
            <button class="menu-btn" onclick="startPuzzle('hard')">6 Слайдеров (Сложный)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h1 id="puzzle-title">Замок</h1>
        <p class="subtitle" style="margin-bottom: 15px;">Сдвигайте пластины к центру (позиция 4)</p>
        
        <div class="hud-bar">
            <div class="hud-item">Канал: <span id="hud-active">1</span></div>
            <div class="hud-item">Отмычка: <span id="hud-picks">0</span></div>
        </div>

        <div class="lock-housing" id="lock-cylinder"></div>

        <div class="msg-box" id="feedback">Пластины смещаются по цепной реакции.</div>

        <div class="mobile-controls">
            <div class="control-row">
                <button class="pad-btn" onclick="moveSelected(-1)">◀ Сдвиг</button>
                <button class="pad-btn" onclick="moveSelected(1)">Сдвиг ▶</button>
            </div>
            <div class="control-row">
                <button class="pad-btn nav-btn" onclick="switchChannel(-1)">▲ Выбрать левее</button>
                <button class="pad-btn nav-btn" onclick="switchChannel(1)">Выбрать правее ▼</button>
            </div>
        </div>
    </div>
</div>

<script>
    const configs = {
        easy: { size: 2, name: "Блок Уровня 2" },
        medium: { size: 4, name: "Блок Уровня 4" },
        hard: { size: 6, name: "Блок Уровня 6" }
    };

    let activeConfig = null;
    let positions = [];
    let links = [];
    let selectedIdx = 0;
    let durability = 3;
    let gameEnded = false;

    let touchStartX = 0;
    let touchStartY = 0;

    function startPuzzle(tier) {
        activeConfig = configs[tier];
        positions = [];
        links = [];
        selectedIdx = 0;
        gameEnded = false; // Сброс состояния окончания игры

        let inputElement = document.getElementById('custom-picks');
        let inputVal = parseInt(inputElement.value);
        
        // Защита от пустого ввода (NaN)
        if (isNaN(inputVal) || inputVal < 1) {
            inputVal = 1;
            inputElement.value = 1;
        }
        durability = inputVal;

        const validStarts = [2, 3, 5, 6];
        for (let i = 0; i < activeConfig.size; i++) {
            positions.push(validStarts[Math.floor(Math.random() * validStarts.length)]);
        }

        for (let i = 0; i < activeConfig.size; i++) {
            links[i] = [];
            for (let j = 0; j < activeConfig.size; j++) {
                if (i === j) {
                    links[i][j] = 1;
                } else {
                    let rand = Math.random();
                    if (rand < 0.3) links[i][j] = 1;       
                    else if (rand < 0.6) links[i][j] = -1; 
                    else links[i][j] = 0;                  
                }
            }
        }

        buildDOM();
        updateUI();

        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
    }

    function buildDOM() {
        const cylinder = document.getElementById('lock-cylinder');
        cylinder.innerHTML = '';

        for (let i = 0; i < activeConfig.size; i++) {
            const channel = document.createElement('div');
            channel.className = 'lock-channel';
            channel.id = `channel-${i}`;
            channel.onclick = () => { if(!gameEnded) { selectedIdx = i; updateUI(); } };

            const socket = document.createElement('div');
            socket.className = 'pin-socket';
            const pin = document.createElement('div');
            pin.className = 'lock-pin';
            pin.id = `pin-${i}`;
            socket.appendChild(pin);

            const track = document.createElement('div');
            track.className = 'slider-track';
            const slider = document.createElement('div');
            slider.className = 'plate-slider';
            slider.id = `slider-${i}`;
            track.appendChild(slider);

            channel.appendChild(socket);
            channel.appendChild(track);
            cylinder.appendChild(channel);
        }
    }

    function updateUI() {
        document.getElementById('hud-active').innerText = selectedIdx + 1;
        document.getElementById('hud-picks').innerText = durability;
        document.getElementById('puzzle-title').innerText = activeConfig.name;

        let winStatus = true;

        for (let i = 0; i < activeConfig.size; i++) {
            const channel = document.getElementById(`channel-${i}`);
            const slider = document.getElementById(`slider-${i}`);
            const pin = document.getElementById(`pin-${i}`);

            if (i === selectedIdx) channel.classList.add('selected');
            else channel.classList.remove('selected');

            let leftPx = ((positions[i] - 1) / 6) * 30; 
            slider.style.left = `${leftPx}px`;

            if (positions[i] === 1 || positions[i] === 7) {
                slider.classList.add('wall-danger');
            } else {
                slider.classList.remove('wall-danger');
            }

            if (positions[i] === 4) {
                pin.classList.add('popped');
            } else {
                pin.classList.remove('popped');
                winStatus = false;
            }
        }

        if (winStatus && !gameEnded) {
            endGame(true);
        }
    }

    function moveSelected(direction) {
        if (gameEnded) return;

        let hitWall = false;
        let tempPositions = [...positions];

        for (let target = 0; target < activeConfig.size; target++) {
            let mult = links[selectedIdx][target];
            if (mult !== 0) {
                tempPositions[target] += (direction * mult);
                if (tempPositions[target] < 1 || tempPositions[target] > 7) {
                    hitWall = true;
                }
            }
        }

        if (hitWall) {
            durability--;
            if (durability <= 0) {
                updateUI();
                endGame(false);
            } else {
                const fb = document.getElementById('feedback');
                fb.innerText = "💥 ТУПИК! Одна из пластин уперлась в стену.";
                updateUI();
            }
        } else {
            positions = tempPositions;
            updateUI();
        }
    }

    function switchChannel(dir) {
        if (gameEnded) return;
        selectedIdx = (selectedIdx + dir + activeConfig.size) % activeConfig.size;
        updateUI();
    }

    function endGame(isWin) {
        gameEnded = true;
        const overlay = document.getElementById('result-overlay');
        const title = document.getElementById('res-title');
        
        overlay.style.display = 'flex';

        if (isWin) {
            title.innerText = "СУНДУК ОТКРЫТ!";
            title.className = "result-title win";
        } else {
            title.innerText = "ОТМЫЧКА СЛОМАЛАСЬ!";
            title.className = "result-title lose";
        }

        setTimeout(() => {
            overlay.style.display = 'none';
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }, 2000);
    }

    // ТАЧ-СВАЙПЫ (С фиксом чувствительности)
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (gameEnded) return;
        let diffX = e.changedTouches[0].screenX - touchStartX;
        let diffY = e.changedTouches[0].screenY - touchStartY;

        if (Math.abs(diffX) > 40 || Math.abs(diffY) > 40) {
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) moveSelected(1); else moveSelected(-1);
            } else {
                if (diffY > 0) switchChannel(1); else switchChannel(-1);
            }
        }
    }, {passive: true});

    // Клавиатура
    window.addEventListener('keydown', e => {
        if (!document.getElementById('game-screen').classList.contains('active') || gameEnded) return;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveSelected(-1);
        if (e.code === 'KeyD' || e.code === 'ArrowRight') moveSelected(1);
        if (e.code === 'KeyW' || e.code === 'ArrowUp') switchChannel(-1);
        if (e.code === 'KeyS' || e.code === 'ArrowDown') switchChannel(1);
    });
</script>
</body>
</html>
